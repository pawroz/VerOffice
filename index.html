document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

adding:13px 14px;border:1px solid rgba(45,36,30,.22);border-radius:4px;font-size:14px;color:#2D241E;background:#fff;margin-bottom:4px;outline:none\">\n          <sc-if value=\"{{ errName }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:12px;color:#b5573f;margin:0 0 12px\">{{ errName }}<\u002Fp><\u002Fsc-if>\n          <div style=\"height:16px\"><\u002Fdiv>\n          <label style=\"display:block;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#8a7666;margin-bottom:8px\">E-mail<\u002Flabel>\n          <input value=\"{{ form.email }}\" sc-camel-on-change=\"{{ setEmail }}\" style=\"width:100%;padding:13px 14px;border:1px solid rgba(45,36,30,.22);border-radius:4px;font-size:14px;color:#2D241E;background:#fff;margin-bottom:4px;outline:none\">\n          <sc-if value=\"{{ errEmail }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:12px;color:#b5573f;margin:0 0 12px\">{{ errEmail }}<\u002Fp><\u002Fsc-if>\n          <div style=\"height:16px\"><\u002Fdiv>\n          <label style=\"display:block;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#8a7666;margin-bottom:8px\">Wiadomość<\u002Flabel>\n          <textarea value=\"{{ form.msg }}\" sc-camel-on-change=\"{{ setMsg }}\" rows=\"4\" style=\"width:100%;padding:13px 14px;border:1px solid rgba(45,36,30,.22);border-radius:4px;font-size:14px;color:#2D241E;background:#fff;margin-bottom:4px;outline:none;resize:vertical\"><\u002Ftextarea>\n          <sc-if value=\"{{ errMsg }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:12px;color:#b5573f;margin:0 0 12px\">{{ errMsg }}<\u002Fp><\u002Fsc-if>\n          <div style=\"height:26px\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ submitForm }}\" style=\"width:100%;background:#C6A06A;color:#241A16;border:none;font-family:inherit;font-size:12px;font-weight:500;letter-spacing:1.6px;text-transform:uppercase;padding:16px;border-radius:4px;cursor:pointer;transition:background .25s\" style-hover=\"background:#d6b487\">Wyślij wiadomość<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;heroLayout&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Portret z prawej&quot;, &quot;Wyśrodkowany&quot;], &quot;default&quot;: &quot;Portret z prawej&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Układ hero&quot; },\n  &quot;showDiscretion&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Sekcja O mnie&quot; },\n  &quot;revealAnim&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Ruch&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    month: 4, year: 2025,\n    selected: { d: 15, m: 4, y: 2025 },\n    selectedHour: null,\n    booked: null,\n    mobileOpen: false,\n    formOpen: false, sent: false,\n    form: { name: '', email: '', msg: '' },\n    errors: {},\n  };\n\n  months = ['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];\n  monthsCap = ['STYCZEŃ','LUTY','MARZEC','KWIECIEŃ','MAJ','CZERWIEC','LIPIEC','SIERPIEŃ','WRZESIEŃ','PAŹDZIERNIK','LISTOPAD','GRUDZIEŃ'];\n  hoursList = ['10:00','12:00','15:00','17:00'];\n\n  scrollToId(id) {\n    const el = document.getElementById(id);\n    if (!el) return;\n    const y = el.getBoundingClientRect().top + window.scrollY - 66;\n    window.scrollTo({ top: y, behavior: 'smooth' });\n  }\n\n  componentDidMount() {\n    this.sections = ['home','about','spec','contact','media'];\n    this.navEls = Array.from(document.querySelectorAll('[data-nav]'));\n    this._onScroll = () => this.updateActive();\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this.updateActive();\n\n    if (this.props.revealAnim !== false) {\n      const els = Array.from(document.querySelectorAll('[data-reveal]'));\n      els.forEach(el => {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(20px)';\n        el.style.transition = 'opacity .85s cubic-bezier(.22,.61,.36,1), transform .85s cubic-bezier(.22,.61,.36,1)';\n        const d = el.getAttribute('data-reveal-delay');\n        if (d) el.style.transitionDelay = d + 'ms';\n      });\n      this.io = new IntersectionObserver((entries) => {\n        entries.forEach(e => {\n          if (e.isIntersecting) {\n            e.target.style.opacity = '1';\n            e.target.style.transform = 'none';\n            this.io.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n      els.forEach(el => this.io.observe(el));\n    }\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    if (this.io) this.io.disconnect();\n  }\n\n  updateActive() {\n    const y = window.scrollY + 100;\n    let cur = 'home';\n    for (const id of this.sections) {\n      const el = document.getElementById(id);\n      if (el && el.offsetTop <= y) cur = id;\n    }\n    this.navEls.forEach(a => {\n      const on = a.getAttribute('data-active') === cur;\n      a.style.borderBottomColor = on ? '#C6A06A' : 'transparent';\n      a.style.color = on ? '#F7F4EF' : 'rgba(247,244,239,.72)';\n    });\n  }\n\n  buildCells() {\n    const { year, month, selected } = this.state;\n    const start = (new Date(year, month, 1).getDay() + 6) % 7;\n    const dim = new Date(year, month + 1, 0).getDate();\n    const prevDim = new Date(year, month, 0).getDate();\n    const cells = [];\n    for (let i = 0; i < 42; i++) {\n      let dayNum, inMonth;\n      if (i < start) { dayNum = prevDim - start + 1 + i; inMonth = false; }\n      else if (i < start + dim) { dayNum = i - start + 1; inMonth = true; }\n      else { dayNum = i - start - dim + 1; inMonth = false; }\n      const sel = inMonth && selected && dayNum === selected.d && month === selected.m && year === selected.y;\n      const base = 'display:flex;align-items:center;justify-content:center;height:38px;font-size:13px;border-radius:50%;';\n      let style;\n      if (!inMonth) style = base + 'color:rgba(247,244,239,.2);';\n      else if (sel) style = base + 'background:#C6A06A;color:#241A16;font-weight:600;cursor:pointer;';\n      else style = base + 'color:rgba(247,244,239,.82);cursor:pointer;';\n      const d = dayNum;\n      const onClick = inMonth\n        ? (() => this.setState({ selected: { d, m: this.state.month, y: this.state.year }, booked: null }))\n        : (() => {});\n      cells.push({ key: 'c' + i, label: String(dayNum), style, onClick });\n    }\n    return cells;\n  }\n\n  hourChips() {\n    return this.hoursList.map(h => {\n      const sel = this.state.selectedHour === h;\n      const style = 'font-family:inherit;font-size:12px;letter-spacing:.5px;padding:7px 14px;border-radius:3px;cursor:pointer;border:1px solid '\n        + (sel ? '#C6A06A' : 'rgba(198,160,106,.35)') + ';background:' + (sel ? '#C6A06A' : 'transparent')\n        + ';color:' + (sel ? '#241A16' : 'rgba(247,244,239,.8)') + ';';\n      return { key: h, label: h, style, onClick: () => this.setState({ selectedHour: h, booked: null }) };\n    });\n  }\n\n  book() {\n    const { selected, selectedHour, month, year } = this.state;\n    const inCurrent = selected && selected.m === month && selected.y === year;\n    if (!inCurrent || !selectedHour) {\n      this.setState({ booked: { ok: false, msg: 'Wybierz dzień w bieżącym miesiącu oraz godzinę spotkania.' } });\n      return;\n    }\n    const msg = 'Rezerwacja wstępna: ' + selected.d + ' ' + this.months[month] + ' ' + year + ', godz. ' + selectedHour + '. Potwierdzimy telefonicznie.';\n    this.setState({ booked: { ok: true, msg } });\n  }\n\n  setName = (e) => this.setState({ form: { ...this.state.form, name: e.target.value } });\n  setEmail = (e) => this.setState({ form: { ...this.state.form, email: e.target.value } });\n  setMsg = (e) => this.setState({ form: { ...this.state.form, msg: e.target.value } });\n  openForm = () => this.setState({ formOpen: true, sent: false, errors: {} });\n  closeForm = () => this.setState({ formOpen: false });\n\n  submitForm() {\n    const f = this.state.form;\n    const errors = {};\n    if (!f.name.trim()) errors.name = 'Podaj imię i nazwisko.';\n    if (!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(f.email)) errors.email = 'Podaj poprawny adres e-mail.';\n    if (!f.msg.trim()) errors.msg = 'Napisz treść wiadomości.';\n    if (Object.keys(errors).length) { this.setState({ errors }); return; }\n    this.setState({ sent: true, errors: {} });\n  }\n\n  renderVals() {\n    const s = this.state;\n    const centered = this.props.heroLayout === 'Wyśrodkowany';\n    return {\n      isHeroSplit: !centered,\n      isHeroCentered: centered,\n      showDiscretion: this.props.showDiscretion !== false,\n      monthLabel: this.monthsCap[s.month] + ' ' + s.year,\n      calCells: this.buildCells(),\n      hours: this.hourChips(),\n      hasBooked: !!s.booked,\n      bookedMsg: s.booked ? s.booked.msg : '',\n      bookedColor: s.booked && s.booked.ok ? '#C6A06A' : '#d99a7a',\n      formOpen: s.formOpen,\n      sent: s.sent,\n      notSent: !s.sent,\n      form: s.form,\n      errName: s.errors.name || '',\n      errEmail: s.errors.email || '',\n      errMsg: s.errors.msg || '',\n      goTo: {\n        home: () => this.scrollToId('home'),\n        about: () => this.scrollToId('about'),\n        spec: () => this.scrollToId('spec'),\n        contact: () => this.scrollToId('contact'),\n        media: () => this.scrollToId('media'),\n      },\n      prevMonth: () => {\n        const m = s.month === 0 ? 11 : s.month - 1;\n        const y = s.month === 0 ? s.year - 1 : s.year;\n        this.setState({ month: m, year: y, booked: null });\n      },\n      nextMonth: () => {\n        const m = s.month === 11 ? 0 : s.month + 1;\n        const y = s.month === 11 ? s.year + 1 : s.year;\n        this.setState({ month: m, year: y, booked: null });\n      },\n      book: () => this.book(),\n      openForm: this.openForm,\n      closeForm: this.closeForm,\n      submitForm: () => this.submitForm(),\n      stop: (e) => e.stopPropagation(),\n      mobileOpen: s.mobileOpen,\n      toggleMobile: () => this.setState({ mobileOpen: !this.state.mobileOpen }),\n      closeMobile: () => this.setState({ mobileOpen: false }),\n      mgo: {\n        home: () => { this.setState({ mobileOpen: false }); this.scrollToId('home'); },\n        about: () => { this.setState({ mobileOpen: false }); this.scrollToId('about'); },\n        spec: () => { this.setState({ mobileOpen: false }); this.scrollToId('spec'); },\n        media: () => { this.setState({ mobileOpen: false }); this.scrollToId('media'); },\n        contact: () => { this.setState({ mobileOpen: false }); this.scrollToId('contact'); },\n      },\n      setName: this.setName,\n      setEmail: this.setEmail,\n      setMsg: this.setMsg,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
